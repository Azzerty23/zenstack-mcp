<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Hono + better-auth</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f4f5;
      padding: 1rem;
    }

    .wrapper { width: 100%; max-width: 360px; }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      margin-bottom: 1.75rem;
    }

    .brand-icon {
      width: 28px;
      height: 28px;
      background: #18181b;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg {
      width: 16px;
      height: 16px;
      stroke: white;
      fill: none;
    }

    .brand-name {
      font-size: 1rem;
      font-weight: 600;
      color: #18181b;
      letter-spacing: -0.015em;
    }

    .card {
      background: white;
      border: 1px solid #e4e4e7;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
    }

    .card-header { margin-bottom: 1.5rem; }

    .card-header h1 {
      font-size: 1.125rem;
      font-weight: 600;
      color: #18181b;
      letter-spacing: -0.02em;
    }

    .card-header p {
      font-size: 0.8125rem;
      color: #71717a;
      margin-top: 3px;
    }

    .demo-section {
      margin-bottom: 1.25rem;
    }

    .demo-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: #a1a1aa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .demo-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .demo-pill {
      font-size: 0.8125rem;
      font-weight: 500;
      color: #3f3f46;
      background: #f4f4f5;
      border: 1px solid #e4e4e7;
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      transition: background .1s, border-color .1s;
    }

    .demo-pill:hover {
      background: #e4e4e7;
      border-color: #d4d4d8;
    }

    .separator {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.25rem;
      color: #d4d4d8;
      font-size: 0.75rem;
    }

    .separator::before,
    .separator::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e4e4e7;
    }

    .field { margin-bottom: 0.875rem; }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #3f3f46;
      margin-bottom: 5px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 9px 11px;
      background: white;
      border: 1px solid #d4d4d8;
      border-radius: 7px;
      font-size: 0.9375rem;
      color: #18181b;
      outline: none;
      transition: border-color .12s, box-shadow .12s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #a1a1aa;
      box-shadow: 0 0 0 3px rgba(0,0,0,.06);
    }

    input::placeholder { color: #a1a1aa; }

    button[type="submit"] {
      width: 100%;
      padding: 10px;
      margin-top: 0.375rem;
      background: #18181b;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .12s;
    }

    button[type="submit"]:hover:not(:disabled) { background: #27272a; }
    button[type="submit"]:active:not(:disabled) { background: #3f3f46; }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }

    .error {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 9px 11px;
      color: #b91c1c;
      font-size: 0.8125rem;
      margin-bottom: 0.875rem;
    }

    .success {
      display: none;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: 1rem;
      background: #f0fdf4;
    }

    .success-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: #15803d;
      margin-bottom: 8px;
    }

    .token-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: #166534;
      margin-bottom: 4px;
    }

    .token-value {
      font-family: ui-monospace, monospace;
      font-size: 0.6875rem;
      color: #14532d;
      background: #dcfce7;
      border: 1px solid #bbf7d0;
      border-radius: 4px;
      padding: 6px 8px;
      word-break: break-all;
      cursor: pointer;
      user-select: all;
    }

    .token-hint {
      font-size: 0.6875rem;
      color: #16a34a;
      margin-top: 4px;
    }

    .card-footer {
      margin-top: 1.25rem;
      padding-top: 1.125rem;
      border-top: 1px solid #f4f4f5;
      text-align: center;
      font-size: 0.75rem;
      color: #a1a1aa;
    }

    .card-footer a { color: #71717a; text-decoration: none; }
    .card-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="brand-name">Hono + better-auth</span>
    </div>

    <div class="card">
      <div class="card-header">
        <h1>Sign in</h1>
        <p>Demo — run <code>bun run db:seed</code> first</p>
      </div>

      <div class="demo-section">
        <div class="demo-label">Demo accounts</div>
        <div class="demo-pills">
          <button type="button" class="demo-pill" data-email="alice@example.com" data-password="alice1234">Alice</button>
          <button type="button" class="demo-pill" data-email="bob@example.com" data-password="bob12345">Bob</button>
          <button type="button" class="demo-pill" data-email="carol@example.com" data-password="carol123">Carol</button>
        </div>
      </div>

      <div class="separator">or</div>

      <form id="login-form">
        <div id="error-container" class="error"></div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="alice@example.com" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <button type="submit" id="login-button">Sign in</button>
      </form>

      <div id="success-container" class="success">
        <div id="success-name" class="success-name"></div>
        <div class="token-label">Bearer token</div>
        <div id="token-value" class="token-value" title="Click to select"></div>
        <div class="token-hint">Click the token to select it</div>
      </div>

      <div class="card-footer">
        Secured by <a href="https://zenstack.dev" target="_blank" rel="noopener noreferrer">ZenStack MCP</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form')
    const emailInput = document.getElementById('email')
    const passwordInput = document.getElementById('password')
    const btn = document.getElementById('login-button')
    const errorEl = document.getElementById('error-container')
    const successEl = document.getElementById('success-container')
    const successName = document.getElementById('success-name')
    const tokenValue = document.getElementById('token-value')

    document.querySelectorAll('.demo-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        emailInput.value = pill.dataset.email
        passwordInput.value = pill.dataset.password
        errorEl.style.display = 'none'
        successEl.style.display = 'none'
        form.style.display = ''
      })
    })

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      errorEl.style.display = 'none'
      btn.disabled = true
      btn.textContent = 'Signing in…'

      try {
        const res = await fetch('/api/auth/sign-in/email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailInput.value, password: passwordInput.value }),
        })
        const data = await res.json()

        if (!res.ok || !data.token) {
          errorEl.textContent = data.message ?? 'Invalid credentials'
          errorEl.style.display = 'block'
          return
        }

        successName.textContent = `Signed in as ${data.user?.name ?? emailInput.value}`
        tokenValue.textContent = data.token
        form.style.display = 'none'
        successEl.style.display = 'block'
      } catch {
        errorEl.textContent = 'Network error — is the server running?'
        errorEl.style.display = 'block'
      } finally {
        btn.disabled = false
        btn.textContent = 'Sign in'
      }
    })
  </script>
</body>
</html>
